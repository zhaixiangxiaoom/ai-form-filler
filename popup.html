<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Form Filler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 AI Form Filler</h1>
      <p class="subtitle">Auto-fill forms with AI-generated data</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="fill">Fill Form</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <!-- Fill Form Tab -->
    <div id="fill-tab" class="tab-content active">
      <div id="status-message" class="status-message"></div>
      
      <div class="form-info">
        <div class="info-item">
          <span class="label">Forms Detected:</span>
          <span id="forms-count" class="value">0</span>
        </div>
        <div class="info-item">
          <span class="label">Total Fields:</span>
          <span id="fields-count" class="value">0</span>
        </div>
      </div>

      <div class="actions">
        <button id="detect-btn" class="btn btn-primary">
          🔍 Detect Forms
        </button>
        <button id="fill-btn" class="btn btn-success" disabled>
          ✨ Generate & Fill
        </button>
      </div>

      <div id="preview-section" class="preview-section" style="display: none;">
        <h3>Field Preview</h3>
        <div id="fields-preview" class="fields-preview"></div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div id="settings-tab" class="tab-content">
      <form id="settings-form">
        <div class="form-group">
          <label for="api-key">API Key *</label>
          <input type="password" id="api-key" placeholder="Enter your Alibaba Cloud Bailian API key" required>
          <small>Your API key is stored locally and never sent to third parties</small>
        </div>

        <div class="form-group">
          <label for="api-url">API URL</label>
          <input type="url" id="api-url" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions">
        </div>

        <div class="form-group">
          <label for="model">AI Model</label>
          <select id="model">
            <option value="qwen-turbo">Qwen-Turbo (Fast)</option>
            <option value="qwen-plus" selected>Qwen-Plus (Balanced)</option>
            <option value="qwen-max">Qwen-Max (Best Quality)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="language">Language</label>
          <select id="language">
            <option value="en">English</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
          </select>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="auto-fill">
            <span>Auto-fill on page load (when forms detected)</span>
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">💾 Save Settings</button>
        </div>
      </form>
    </div>

    <footer>
      <p class="footer-text">AI Form Filler v1.0.0</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
